<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Downloader</title>
<style>
    body {
        font-family: -apple-system, Arial, sans-serif;
        max-width: 480px;
        margin: 60px auto;
        text-align: center;
        color: #222;
    }
    h2 { margin-bottom: 4px; }
    input, select, button {
        width: 100%;
        padding: 12px;
        font-size: 15px;
        margin: 8px 0;
        box-sizing: border-box;
        border-radius: 6px;
        border: 1px solid #ccc;
    }
    button {
        cursor: pointer;
        background: #cc0000;
        color: white;
        border: none;
        font-weight: bold;
    }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #status { margin-top: 12px; color: #444; min-height: 20px; }
</style>
</head>
<body>
    <h2>YouTube Downloader</h2>
    <p style="color:#777; font-size: 14px;">Paste a link, pick a quality, download.</p>

    <input id="url" type="text" placeholder="Paste YouTube URL here">
    <button id="checkBtn" onclick="checkVideo()">Check Video</button>

    <select id="quality" disabled>
        <option>Check a video first</option>
    </select>
    <button id="downloadBtn" onclick="downloadVideo()" disabled>Download</button>

    <div id="status"></div>

<script>
async function checkVideo() {
    const url = document.getElementById('url').value.trim();
    const status = document.getElementById('status');
    const quality = document.getElementById('quality');
    const downloadBtn = document.getElementById('downloadBtn');

    if (!url) { status.textContent = "Enter a URL first."; return; }

    status.textContent = "Fetching video info...";
    downloadBtn.disabled = true;
    quality.disabled = true;

    try {
        const res = await fetch('/formats', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url})
        });
        const data = await res.json();
        if (data.error) {
            status.textContent = "Error: " + data.error;
            return;
        }
        quality.innerHTML = "";
        data.options.forEach(opt => {
            const el = document.createElement('option');
            el.value = opt;
            el.textContent = opt;
            quality.appendChild(el);
        });
        quality.disabled = false;
        downloadBtn.disabled = false;
        status.textContent = "Found: " + data.title;
    } catch (e) {
        status.textContent = "Error: " + e;
    }
}

async function downloadVideo() {
    const url = document.getElementById('url').value.trim();
    const quality = document.getElementById('quality').value;
    const status = document.getElementById('status');
    const btn = document.getElementById('downloadBtn');

    btn.disabled = true;
    status.textContent = "Downloading & converting... this can take a minute.";

    try {
        const res = await fetch('/download', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: new URLSearchParams({url, quality})
        });

        if (!res.ok) {
            const err = await res.json();
            status.textContent = "Error: " + err.error;
            btn.disabled = false;
            return;
        }

        const blob = await res.blob();
        const disposition = res.headers.get('Content-Disposition') || '';
        const match = disposition.match(/filename="?([^"]+)"?/);
        const filename = match ? match[1] : 'download';

        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();

        status.textContent = "Done! Check your downloads folder.";
    } catch (e) {
        status.textContent = "Error: " + e;
    }
    btn.disabled = false;
}
</script>
</body>
</html>
